<svg width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1A1A1A"/>
  
  <!-- Abstract grid lines -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8B8C7A" stroke-width="1" opacity="0.1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Data nodes -->
  <rect x="600" y="300" width="100" height="100" fill="none" stroke="#8B8C7A" stroke-width="2" opacity="0.8"/>
  <rect x="750" y="450" width="100" height="100" fill="none" stroke="#8B8C7A" stroke-width="2" opacity="0.8"/>
  <rect x="900" y="300" width="100" height="100" fill="none" stroke="#8B8C7A" stroke-width="2" opacity="0.8"/>
  
  <!-- Connecting lines -->
  <path d="M 700 350 L 750 450 L 900 350" fill="none" stroke="#8B8C7A" stroke-width="2" opacity="0.4"/>
  
  <text x="800" y="700" font-family="sans-serif" font-size="24" fill="#EAE7DF" text-anchor="middle" letter-spacing="4">RAG PIPELINE ARCHITECTURE</text>
</svg>
